services:
  crm-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      CRM__RuntimeMode: NonProduction
      CRM__PortalIntegration: Planned
      CRM__FinancialIntegration: Planned
    ports:
      - "8093:8080"
